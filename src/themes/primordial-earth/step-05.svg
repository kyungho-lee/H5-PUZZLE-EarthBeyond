<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow05" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepglow05" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg05" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="oceanGrad05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a88d8"/>
      <stop offset="50%" stop-color="#0a5090"/>
      <stop offset="100%" stop-color="#061838"/>
    </linearGradient>
    <linearGradient id="skyGrad05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </linearGradient>
  </defs>

  <!-- Background sky -->
  <rect width="240" height="240" fill="url(#skyGrad05)"/>

  <!-- Stars -->
  <g opacity="0.45">
    <circle cx="25" cy="22" r="1" fill="#c8c6e0"/>
    <circle cx="65" cy="12" r="0.8" fill="#aaa8c8"/>
    <circle cx="112" cy="8" r="1.2" fill="#c8c6e0"/>
    <circle cx="165" cy="18" r="0.8" fill="#aaa8c8"/>
    <circle cx="200" cy="30" r="1" fill="#c8c6e0"/>
    <circle cx="218" cy="60" r="0.8" fill="#aaa8c8"/>
    <circle cx="15" cy="75" r="1" fill="#c8c6e0"/>
    <circle cx="38" cy="50" r="0.8" fill="#b8b6d8"/>
    <circle cx="185" cy="45" r="1" fill="#aaa8c8"/>
    <circle cx="230" cy="85" r="0.8" fill="#c8c6e0"/>
  </g>

  <!-- Moon (faint) -->
  <circle cx="185" cy="48" r="14" fill="#c8c0a8" opacity="0.35"/>
  <circle cx="180" cy="44" r="14" fill="#0a1828" opacity="0.5"/>

  <!-- Ocean body -->
  <rect x="0" y="130" width="240" height="110" fill="url(#oceanGrad05)"/>

  <!-- Wave 1 — back -->
  <path d="M-10 130 Q20 120 50 130 Q80 140 110 130 Q140 120 170 130 Q200 140 240 128 L240 145 L-10 145 Z"
        fill="#3fa9f5" opacity="0.35" filter="url(#glow05)"/>

  <!-- Wave 2 — mid -->
  <path d="M-10 142 Q30 132 65 142 Q100 152 135 140 Q165 130 200 142 Q220 148 250 138 L250 158 L-10 158 Z"
        fill="#3fa9f5" opacity="0.45" filter="url(#glow05)"/>

  <!-- Wave 3 — front -->
  <path d="M-10 155 Q25 145 58 155 Q90 165 125 153 Q160 142 195 155 Q215 162 250 150 L250 172 L-10 172 Z"
        fill="#3fa9f5" opacity="0.55" filter="url(#glow05)"/>

  <!-- Ocean glow sheen -->
  <ellipse cx="120" cy="148" rx="90" ry="18" fill="#3fa9f5" filter="url(#deepglow05)" opacity="0.18"/>

  <!-- Horizon reflection streak -->
  <line x1="60" y1="132" x2="180" y2="132" stroke="#88d8ff" stroke-width="1.5"
        opacity="0.4" filter="url(#glow05)"/>

  <!-- Raindrops / first water falling -->
  <g fill="#88ccff" opacity="0.6" filter="url(#glow05)">
    <ellipse cx="55" cy="85" rx="1.5" ry="4"/>
    <ellipse cx="78" cy="70" rx="1.5" ry="4"/>
    <ellipse cx="100" cy="95" rx="1.5" ry="4"/>
    <ellipse cx="130" cy="72" rx="1.5" ry="4"/>
    <ellipse cx="158" cy="88" rx="1.5" ry="4"/>
    <ellipse cx="180" cy="75" rx="1.5" ry="4"/>
    <ellipse cx="42" cy="105" rx="1" ry="3"/>
    <ellipse cx="200" cy="100" rx="1" ry="3"/>
  </g>

  <!-- Step number watermark -->
  <text x="120" y="118" font-family="monospace" font-size="42" font-weight="bold"
        fill="#3fa9f5" text-anchor="middle" opacity="0.12" filter="url(#glow05)">05</text>

  <!-- Scene label -->
  <text x="120" y="222" font-family="monospace" font-size="13" fill="#3fa9f5"
        text-anchor="middle" letter-spacing="1" opacity="0.9">FIRST OCEANS</text>
</svg>
