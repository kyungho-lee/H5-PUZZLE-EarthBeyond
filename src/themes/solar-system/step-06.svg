<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow06" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow06" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="europaGrad" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="45%" stop-color="#b0d8ff"/>
      <stop offset="80%" stop-color="#6098d8"/>
      <stop offset="100%" stop-color="#204880"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars -->
  <circle cx="20" cy="16" r="1" fill="white" opacity="0.5"/>
  <circle cx="58" cy="8" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="95" cy="33" r="1" fill="white" opacity="0.7"/>
  <circle cx="133" cy="5" r="1" fill="white" opacity="0.5"/>
  <circle cx="173" cy="19" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="213" cy="13" r="1" fill="white" opacity="0.6"/>
  <circle cx="229" cy="47" r="1" fill="white" opacity="0.4"/>
  <circle cx="8" cy="82" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="235" cy="103" r="1" fill="white" opacity="0.3"/>
  <circle cx="6" cy="148" r="1" fill="white" opacity="0.6"/>
  <circle cx="237" cy="160" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="193" r="1" fill="white" opacity="0.5"/>
  <circle cx="219" cy="197" r="1" fill="white" opacity="0.3"/>
  <circle cx="72" cy="217" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="160" cy="222" r="1" fill="white" opacity="0.4"/>

  <!-- Europa body -->
  <circle cx="120" cy="112" r="72" fill="url(#europaGrad)" filter="url(#softglow06)"/>

  <!-- Surface cracks / lineae -->
  <clipPath id="europaClip"><circle cx="120" cy="112" r="72"/></clipPath>
  <g clip-path="url(#europaClip)" stroke="#4070b0" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 80 75 Q 110 95 140 88 Q 165 82 175 100"/>
    <path d="M 65 95 Q 90 110 95 135 Q 100 155 120 165"/>
    <path d="M 145 70 Q 155 98 148 120 Q 140 145 150 160"/>
    <path d="M 80 140 Q 100 130 125 145 Q 148 158 165 148"/>
    <path d="M 58 118 Q 78 105 100 118 Q 120 130 100 148"/>
    <path d="M 140 95 Q 158 112 152 132 Q 146 150 160 162"/>
    <path d="M 90 85 Q 105 100 115 118 Q 125 135 118 155"/>
  </g>

  <!-- Slightly lighter crack highlights -->
  <g clip-path="url(#europaClip)" stroke="#80b8e8" stroke-width="0.5" fill="none" opacity="0.4">
    <path d="M 80 75 Q 110 95 140 88 Q 165 82 175 100"/>
    <path d="M 65 95 Q 90 110 95 135 Q 100 155 120 165"/>
    <path d="M 145 70 Q 155 98 148 120 Q 140 145 150 160"/>
  </g>

  <!-- Label -->
  <text x="120" y="207" font-family="monospace" font-size="13" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="2">EUROPA</text>
</svg>
