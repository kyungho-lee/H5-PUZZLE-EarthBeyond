<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow09" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep black -->
  <rect width="240" height="240" fill="#010308"/>

  <!-- Many stars — deep space feel -->
  <circle cx="12" cy="20" r="1" fill="white" opacity="0.7"/>
  <circle cx="38" cy="8" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="68" cy="32" r="1" fill="white" opacity="0.6"/>
  <circle cx="88" cy="12" r="1" fill="white" opacity="0.4"/>
  <circle cx="115" cy="22" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="145" cy="8" r="1" fill="white" opacity="0.5"/>
  <circle cx="172" cy="28" r="1" fill="white" opacity="0.7"/>
  <circle cx="200" cy="14" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="225" cy="38" r="1" fill="white" opacity="0.6"/>
  <circle cx="8" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="32" cy="75" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="58" cy="62" r="1" fill="white" opacity="0.6"/>
  <circle cx="185" cy="52" r="1" fill="white" opacity="0.5"/>
  <circle cx="215" cy="68" r="1" fill="white" opacity="0.4"/>
  <circle cx="235" cy="90" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="5" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="28" cy="120" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="225" cy="115" r="1" fill="white" opacity="0.6"/>
  <circle cx="240" cy="145" r="1" fill="white" opacity="0.3"/>
  <circle cx="10" cy="155" r="1" fill="white" opacity="0.5"/>
  <circle cx="35" cy="175" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="215" cy="170" r="1" fill="white" opacity="0.6"/>
  <circle cx="235" cy="195" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="8" cy="200" r="1" fill="white" opacity="0.4"/>
  <circle cx="50" cy="218" r="1" fill="white" opacity="0.6"/>
  <circle cx="85" cy="228" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="125" cy="235" r="1" fill="white" opacity="0.5"/>
  <circle cx="165" cy="225" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="218" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="228" cy="228" r="1" fill="white" opacity="0.5"/>

  <!-- Sun's scattered light rays (Voyager-style bands of light) -->
  <g opacity="0.18" filter="url(#rayGlow)">
    <!-- Wide rays emanating from upper left — sunbeam diffraction -->
    <polygon points="62,50 66,50 200,240 185,240" fill="#c8a870"/>
    <polygon points="70,50 74,50 215,240 200,240" fill="#d0b880"/>
    <polygon points="78,48 82,48 230,240 218,240" fill="#c8a870"/>
    <polygon points="86,46 90,46 240,230 235,215" fill="#b89860"/>
    <polygon points="55,52 58,52 180,240 165,240" fill="#b89860"/>
  </g>

  <!-- Light source hint (off-frame sun direction) -->
  <circle cx="68" cy="48" r="8" fill="#ffe080" opacity="0.12" filter="url(#rayGlow)"/>

  <!-- The Pale Blue Dot -->
  <circle cx="148" cy="148" r="4" fill="#4488ff" opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="148" cy="148" r="2.5" fill="#88aaff" opacity="0.8"/>
  <circle cx="148" cy="148" r="1.5" fill="#ccddff" opacity="0.7"/>

  <!-- Label -->
  <text x="120" y="214" font-family="monospace" font-size="11" fill="white" opacity="0.8" text-anchor="middle" letter-spacing="2">PALE BLUE DOT</text>
</svg>
