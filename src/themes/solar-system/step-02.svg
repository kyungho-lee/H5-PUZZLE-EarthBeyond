<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow02" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow02" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="marsGrad" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#f08060"/>
      <stop offset="50%" stop-color="#e2683c"/>
      <stop offset="100%" stop-color="#8a2800"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars -->
  <circle cx="22" cy="18" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="10" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="98" cy="35" r="1" fill="white" opacity="0.4"/>
  <circle cx="135" cy="6" r="1" fill="white" opacity="0.7"/>
  <circle cx="175" cy="22" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="215" cy="18" r="1" fill="white" opacity="0.5"/>
  <circle cx="228" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="72" r="1" fill="white" opacity="0.4"/>
  <circle cx="10" cy="85" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="45" cy="115" r="1" fill="white" opacity="0.3"/>
  <circle cx="225" cy="108" r="1" fill="white" opacity="0.6"/>
  <circle cx="5" cy="155" r="1" fill="white" opacity="0.4"/>
  <circle cx="235" cy="165" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="20" cy="188" r="1" fill="white" opacity="0.3"/>
  <circle cx="215" cy="192" r="1" fill="white" opacity="0.6"/>
  <circle cx="80" cy="210" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="160" cy="205" r="1" fill="white" opacity="0.5"/>
  <circle cx="140" cy="225" r="1" fill="white" opacity="0.3"/>
  <circle cx="52" cy="232" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="192" cy="230" r="1" fill="white" opacity="0.4"/>

  <!-- Mars body -->
  <circle cx="120" cy="112" r="70" fill="url(#marsGrad)" filter="url(#softglow02)"/>

  <!-- Surface details - darker patches -->
  <ellipse cx="100" cy="115" rx="20" ry="14" fill="#c04a20" opacity="0.4"/>
  <ellipse cx="145" cy="105" rx="16" ry="10" fill="#c04a20" opacity="0.3"/>
  <ellipse cx="118" cy="140" rx="18" ry="10" fill="#c04a20" opacity="0.35"/>

  <!-- North polar cap -->
  <ellipse cx="120" cy="48" rx="22" ry="10" fill="white" opacity="0.75" filter="url(#softglow02)"/>
  <ellipse cx="120" cy="48" rx="16" ry="7" fill="white" opacity="0.5"/>

  <!-- South polar cap hint -->
  <ellipse cx="120" cy="174" rx="14" ry="6" fill="white" opacity="0.5"/>

  <!-- Label -->
  <text x="120" y="206" font-family="monospace" font-size="13" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="3">MARS</text>
</svg>
