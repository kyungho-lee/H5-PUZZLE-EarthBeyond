<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow07" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow07" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="plutoGrad" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#e0d0b8"/>
      <stop offset="50%" stop-color="#c9b8a0"/>
      <stop offset="85%" stop-color="#8a7860"/>
      <stop offset="100%" stop-color="#504030"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars -->
  <circle cx="16" cy="14" r="1" fill="white" opacity="0.6"/>
  <circle cx="52" cy="7" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="90" cy="28" r="1" fill="white" opacity="0.7"/>
  <circle cx="128" cy="5" r="1" fill="white" opacity="0.5"/>
  <circle cx="168" cy="16" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="208" cy="10" r="1" fill="white" opacity="0.6"/>
  <circle cx="226" cy="44" r="1" fill="white" opacity="0.4"/>
  <circle cx="6" cy="78" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="232" cy="98" r="1" fill="white" opacity="0.3"/>
  <circle cx="4" cy="142" r="1" fill="white" opacity="0.6"/>
  <circle cx="234" cy="155" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="18" cy="188" r="1" fill="white" opacity="0.5"/>
  <circle cx="216" cy="192" r="1" fill="white" opacity="0.3"/>
  <circle cx="68" cy="212" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="156" cy="218" r="1" fill="white" opacity="0.4"/>
  <circle cx="38" cy="195" r="1" fill="white" opacity="0.5"/>
  <circle cx="192" cy="208" r="1.5" fill="white" opacity="0.3"/>

  <!-- Pluto body -->
  <circle cx="120" cy="112" r="68" fill="url(#plutoGrad)" filter="url(#softglow07)"/>

  <!-- Darker surface patches -->
  <clipPath id="plutoClip"><circle cx="120" cy="112" r="68"/></clipPath>
  <g clip-path="url(#plutoClip)">
    <ellipse cx="90" cy="100" rx="18" ry="12" fill="#7a6850" opacity="0.45"/>
    <ellipse cx="152" cy="118" rx="15" ry="10" fill="#7a6850" opacity="0.4"/>
    <ellipse cx="110" cy="148" rx="14" ry="8" fill="#7a6850" opacity="0.38"/>

    <!-- Tombaugh Regio (heart shape) - bright region -->
    <!-- Left lobe of heart -->
    <ellipse cx="112" cy="118" rx="20" ry="22" fill="#e8dcc8" opacity="0.7"/>
    <!-- Right lobe of heart -->
    <ellipse cx="132" cy="118" rx="18" ry="22" fill="#e8dcc8" opacity="0.65"/>
    <!-- Bottom point of heart -->
    <polygon points="112,138 132,138 122,158" fill="#e8dcc8" opacity="0.7"/>
    <!-- Blend center -->
    <ellipse cx="122" cy="122" rx="18" ry="20" fill="#f0e8d8" opacity="0.5"/>
  </g>

  <!-- Label -->
  <text x="120" y="206" font-family="monospace" font-size="13" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="3">PLUTO</text>
</svg>
