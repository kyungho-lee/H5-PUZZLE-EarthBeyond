<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow08" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coronaGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow08" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sunGrad" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fff5a0"/>
      <stop offset="40%" stop-color="#ffcc00"/>
      <stop offset="75%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <radialGradient id="coronaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#ff8a00" stop-opacity="0"/>
      <stop offset="80%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars (fewer, dim — outshone by sun) -->
  <circle cx="20" cy="18" r="1" fill="white" opacity="0.3"/>
  <circle cx="55" cy="8" r="1" fill="white" opacity="0.2"/>
  <circle cx="210" cy="15" r="1" fill="white" opacity="0.3"/>
  <circle cx="228" cy="50" r="1" fill="white" opacity="0.2"/>
  <circle cx="8" cy="80" r="1" fill="white" opacity="0.25"/>
  <circle cx="234" cy="165" r="1" fill="white" opacity="0.2"/>
  <circle cx="18" cy="195" r="1" fill="white" opacity="0.3"/>
  <circle cx="220" cy="200" r="1" fill="white" opacity="0.2"/>
  <circle cx="68" cy="218" r="1" fill="white" opacity="0.25"/>
  <circle cx="160" cy="222" r="1" fill="white" opacity="0.2"/>

  <!-- Outer corona glow -->
  <circle cx="120" cy="112" r="105" fill="url(#coronaGrad)" filter="url(#coronaGlow)" opacity="0.6"/>

  <!-- Corona rays -->
  <g stroke="#ff8a00" stroke-width="1.5" fill="none" opacity="0.35" filter="url(#coronaGlow)">
    <line x1="120" y1="112" x2="120" y2="14"/>
    <line x1="120" y1="112" x2="120" y2="210"/>
    <line x1="120" y1="112" x2="22" y2="112"/>
    <line x1="120" y1="112" x2="218" y2="112"/>
    <line x1="120" y1="112" x2="51" y2="43"/>
    <line x1="120" y1="112" x2="189" y2="43"/>
    <line x1="120" y1="112" x2="51" y2="181"/>
    <line x1="120" y1="112" x2="189" y2="181"/>
    <line x1="120" y1="112" x2="30" y2="72"/>
    <line x1="120" y1="112" x2="210" y2="72"/>
    <line x1="120" y1="112" x2="30" y2="152"/>
    <line x1="120" y1="112" x2="210" y2="152"/>
  </g>

  <!-- Sun body -->
  <circle cx="120" cy="112" r="75" fill="url(#sunGrad)" filter="url(#softglow08)"/>

  <!-- Surface granulation hints -->
  <clipPath id="sunClip"><circle cx="120" cy="112" r="75"/></clipPath>
  <g clip-path="url(#sunClip)" opacity="0.3">
    <circle cx="95" cy="88" r="12" fill="#ffaa00"/>
    <circle cx="145" cy="80" r="9" fill="#ffcc00"/>
    <circle cx="80" cy="118" r="10" fill="#ff8800"/>
    <circle cx="148" cy="130" r="11" fill="#ffaa00"/>
    <circle cx="112" cy="148" r="8" fill="#ffcc00"/>
    <circle cx="155" cy="105" r="7" fill="#ff9900"/>
  </g>

  <!-- Label -->
  <text x="120" y="212" font-family="monospace" font-size="14" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="4">SUN</text>
</svg>
