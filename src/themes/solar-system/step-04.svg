<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow04" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow04" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="saturnGrad" cx="38%" cy="32%" r="56%">
      <stop offset="0%" stop-color="#f8ecc0"/>
      <stop offset="55%" stop-color="#e8d49a"/>
      <stop offset="100%" stop-color="#9a7830"/>
    </radialGradient>
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d090" stop-opacity="0"/>
      <stop offset="35%" stop-color="#d8b860" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#c8a840" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#d8c870" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8d890" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars -->
  <circle cx="20" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="58" cy="8" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="95" cy="32" r="1" fill="white" opacity="0.7"/>
  <circle cx="132" cy="6" r="1" fill="white" opacity="0.5"/>
  <circle cx="172" cy="20" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="212" cy="14" r="1" fill="white" opacity="0.6"/>
  <circle cx="228" cy="48" r="1" fill="white" opacity="0.4"/>
  <circle cx="8" cy="82" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="234" cy="102" r="1" fill="white" opacity="0.3"/>
  <circle cx="6" cy="148" r="1" fill="white" opacity="0.6"/>
  <circle cx="236" cy="158" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="192" r="1" fill="white" opacity="0.5"/>
  <circle cx="218" cy="196" r="1" fill="white" opacity="0.3"/>
  <circle cx="72" cy="218" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="158" cy="222" r="1" fill="white" opacity="0.4"/>

  <!-- Rings behind planet (back half) -->
  <ellipse cx="120" cy="118" rx="100" ry="22" fill="none" stroke="#c8a840" stroke-width="8" opacity="0.35"/>
  <ellipse cx="120" cy="118" rx="88" ry="18" fill="none" stroke="#d8b860" stroke-width="5" opacity="0.3"/>
  <ellipse cx="120" cy="118" rx="112" ry="26" fill="none" stroke="#b89830" stroke-width="5" opacity="0.2"/>

  <!-- Saturn body -->
  <circle cx="120" cy="108" r="60" fill="url(#saturnGrad)" filter="url(#softglow04)"/>

  <!-- Band stripes -->
  <clipPath id="saturnClip"><circle cx="120" cy="108" r="60"/></clipPath>
  <g clip-path="url(#saturnClip)">
    <rect x="60" y="88" width="120" height="8" fill="#c8a840" opacity="0.35" rx="2"/>
    <rect x="60" y="100" width="120" height="10" fill="#d8b860" opacity="0.3" rx="2"/>
    <rect x="60" y="114" width="120" height="7" fill="#c8a840" opacity="0.3" rx="2"/>
  </g>

  <!-- Rings in front of planet (front half) -->
  <ellipse cx="120" cy="118" rx="100" ry="22" fill="none" stroke="#c8a840" stroke-width="8" opacity="0.7" stroke-dasharray="314 314" stroke-dashoffset="157"/>
  <ellipse cx="120" cy="118" rx="88" ry="18" fill="none" stroke="#d8b860" stroke-width="5" opacity="0.65" stroke-dasharray="276 276" stroke-dashoffset="138"/>
  <ellipse cx="120" cy="118" rx="112" ry="26" fill="none" stroke="#b89830" stroke-width="5" opacity="0.5" stroke-dasharray="352 352" stroke-dashoffset="176"/>

  <!-- Label -->
  <text x="120" y="212" font-family="monospace" font-size="13" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="2">SATURN</text>
</svg>
