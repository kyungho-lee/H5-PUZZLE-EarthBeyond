  <circle cx="184" cy="120" r="1.5" fill="#d0e0ff" opacity="0.35"/>

  <!-- Central Sun — tiny distant point -->
  <circle cx="120" cy="112" r="5" fill="url(#sunDot)" filter="url(#softglow11)" opacity="0.9"/>
  <circle cx="120" cy="112" r="2.5" fill="#ffffc0" opacity="1"/>

  <!-- Sun glow -->
  <circle cx="120" cy="112" r="10" fill="#ffcc40" opacity="0.15" filter="url(#glow11)"/>

  <!-- Label -->
  <text x="120" y="228" font-family="monospace" font-size="11" fill="#c0d0ff" opacity="0.85" text-anchor="middle" letter-spacing="2">OORT CLOUD ★</text>
</svg>
