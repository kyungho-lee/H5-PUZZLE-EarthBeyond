<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow11" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow11" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cloudGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="oortGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e8ff" stop-opacity="0.05"/>
      <stop offset="40%" stop-color="#c0d0f0" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#a0b8e0" stop-opacity="0.25"/>
      <stop offset="85%" stop-color="#e0e8ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c0d0f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffc0"/>
      <stop offset="100%" stop-color="#ffcc40"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Background stars (very faint — we're at the edge of solar system) -->
  <circle cx="14" cy="16" r="1" fill="white" opacity="0.3"/>
  <circle cx="48" cy="6" r="1" fill="white" opacity="0.25"/>
  <circle cx="85" cy="25" r="1" fill="white" opacity="0.35"/>
  <circle cx="125" cy="8" r="1" fill="white" opacity="0.28"/>
  <circle cx="165" cy="18" r="1" fill="white" opacity="0.3"/>
  <circle cx="205" cy="10" r="1" fill="white" opacity="0.25"/>
  <circle cx="225" cy="40" r="1" fill="white" opacity="0.3"/>
  <circle cx="6" cy="75" r="1" fill="white" opacity="0.25"/>
  <circle cx="232" cy="95" r="1" fill="white" opacity="0.28"/>
  <circle cx="4" cy="145" r="1" fill="white" opacity="0.3"/>
  <circle cx="234" cy="158" r="1" fill="white" opacity="0.25"/>
  <circle cx="18" cy="190" r="1" fill="white" opacity="0.3"/>
  <circle cx="218" cy="195" r="1" fill="white" opacity="0.28"/>
  <circle cx="68" cy="215" r="1" fill="white" opacity="0.25"/>
  <circle cx="160" cy="220" r="1" fill="white" opacity="0.3"/>

  <!-- Oort cloud glow backdrop -->
  <circle cx="120" cy="112" r="98" fill="url(#oortGrad)" filter="url(#cloudGlow)"/>

  <!-- Oort cloud comet/iceball point cloud — spherical distribution -->
  <!-- Outer ring dots -->
  <circle cx="120" cy="18" r="1.5" fill="#e0e8ff" opacity="0.65"/>
  <circle cx="155" cy="24" r="1" fill="#c8d8f0" opacity="0.55"/>
  <circle cx="188" cy="40" r="1.5" fill="#e0e8ff" opacity="0.6"/>
  <circle cx="210" cy="62" r="1" fill="#d0e0ff" opacity="0.5"/>
  <circle cx="218" cy="90" r="1.5" fill="#e0e8ff" opacity="0.65"/>
  <circle cx="216" cy="120" r="1" fill="#c8d8f0" opacity="0.55"/>
  <circle cx="210" cy="148" r="1.5" fill="#e0e8ff" opacity="0.6"/>
  <circle cx="194" cy="172" r="1" fill="#d0e0ff" opacity="0.5"/>
  <circle cx="170" cy="192" r="1.5" fill="#e0e8ff" opacity="0.65"/>
  <circle cx="143" cy="205" r="1" fill="#c8d8f0" opacity="0.55"/>
