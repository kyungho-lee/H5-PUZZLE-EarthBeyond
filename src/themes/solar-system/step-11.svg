  <circle cx="26" cy="148" r="1.5" fill="#e0e8ff" opacity="0.6"/>
  <circle cx="20" cy="120" r="1" fill="#d0e0ff" opacity="0.5"/>
  <circle cx="22" cy="92" r="1.5" fill="#e0e8ff" opacity="0.65"/>
  <circle cx="30" cy="65" r="1" fill="#c8d8f0" opacity="0.55"/>
  <circle cx="48" cy="42" r="1.5" fill="#e0e8ff" opacity="0.6"/>
  <circle cx="72" cy="26" r="1" fill="#d0e0ff" opacity="0.5"/>
  <circle cx="98" cy="17" r="1.5" fill="#e0e8ff" opacity="0.65"/>

  <!-- Mid-ring dots -->
  <circle cx="120" cy="35" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="148" cy="38" r="1.5" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="172" cy="52" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="192" cy="72" r="1.5" fill="#d0e0ff" opacity="0.45"/>
  <circle cx="200" cy="98" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="198" cy="126" r="1.5" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="185" cy="152" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="164" cy="170" r="1.5" fill="#d0e0ff" opacity="0.45"/>
  <circle cx="140" cy="183" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="114" cy="186" r="1.5" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="88" cy="181" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="65" cy="168" r="1.5" fill="#d0e0ff" opacity="0.45"/>
  <circle cx="47" cy="150" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="38" cy="126" r="1.5" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="38" cy="100" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="48" cy="76" r="1.5" fill="#d0e0ff" opacity="0.45"/>
  <circle cx="66" cy="56" r="1" fill="#e0e8ff" opacity="0.5"/>
  <circle cx="90" cy="42" r="1.5" fill="#c8d8f0" opacity="0.45"/>

  <!-- Scattered inner icy bodies -->
  <circle cx="75" cy="78" r="1" fill="#e0e8ff" opacity="0.4"/>
  <circle cx="162" cy="68" r="1.5" fill="#c8d8f0" opacity="0.35"/>
  <circle cx="180" cy="142" r="1" fill="#e0e8ff" opacity="0.4"/>
  <circle cx="58" cy="155" r="1.5" fill="#d0e0ff" opacity="0.35"/>
  <circle cx="142" cy="165" r="1" fill="#e0e8ff" opacity="0.4"/>
  <circle cx="82" cy="162" r="1" fill="#c8d8f0" opacity="0.35"/>
  <circle cx="68" cy="95" r="1.5" fill="#e0e8ff" opacity="0.4"/>
