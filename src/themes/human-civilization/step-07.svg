<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" fill="#0a0e1a"/>

  <!-- Steam wisps -->
  <g stroke="#888888" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M100,62 Q95,50 100,40 Q105,30 100,20"/>
    <path d="M120,58 Q115,46 120,36 Q125,26 120,16"/>
    <path d="M140,62 Q135,50 140,40 Q145,30 140,20"/>
  </g>

  <!-- Gear outer ring -->
  <g filter="url(#glow)" fill="none" stroke="#ff9020" opacity="0.95">
    <!-- Main gear circle -->
    <circle cx="120" cy="125" r="55" stroke-width="10"/>
    <circle cx="120" cy="125" r="38" stroke-width="3"/>
    <circle cx="120" cy="125" r="18" fill="#ff9020" stroke="none" opacity="0.9"/>

    <!-- Gear teeth (12 teeth) -->
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(0 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(30 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(60 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(90 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(120 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(150 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(180 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(210 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(240 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(270 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(300 120 125)"/>
    <rect x="112" y="64" width="16" height="16" rx="3" fill="#ff9020" stroke="none" transform="rotate(330 120 125)"/>
  </g>

  <!-- Spokes -->
  <g stroke="#ff9020" stroke-width="3" opacity="0.7">
    <line x1="120" y1="107" x2="120" y2="143"/>
    <line x1="102" y1="125" x2="138" y2="125"/>
    <line x1="107" y1="112" x2="133" y2="138"/>
    <line x1="133" y1="112" x2="107" y2="138"/>
  </g>

  <!-- Center bolt -->
  <circle cx="120" cy="125" r="8" fill="#331000" stroke="#ff9020" stroke-width="2"/>
  <circle cx="120" cy="125" r="3" fill="#ff9020"/>

  <!-- Label -->
  <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ff9020" letter-spacing="2">INDUSTRIAL</text>
</svg>
