<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" fill="#0a0e1a"/>

  <!-- Circuit board pattern -->
  <g filter="url(#glow)" stroke="#00c8ff" fill="none" opacity="0.85">
    <!-- Horizontal traces -->
    <line x1="40" y1="75" x2="100" y2="75" stroke-width="2"/>
    <line x1="100" y1="75" x2="140" y2="75" stroke-width="1.5"/>
    <line x1="140" y1="75" x2="200" y2="75" stroke-width="2"/>

    <line x1="40" y1="105" x2="80" y2="105" stroke-width="1.5"/>
    <line x1="80" y1="105" x2="160" y2="105" stroke-width="2"/>
    <line x1="160" y1="105" x2="200" y2="105" stroke-width="1.5"/>

    <line x1="40" y1="135" x2="70" y2="135" stroke-width="2"/>
    <line x1="70" y1="135" x2="170" y2="135" stroke-width="1.5"/>
    <line x1="170" y1="135" x2="200" y2="135" stroke-width="2"/>

    <line x1="40" y1="165" x2="110" y2="165" stroke-width="1.5"/>
    <line x1="110" y1="165" x2="200" y2="165" stroke-width="2"/>

    <!-- Vertical traces -->
    <line x1="80" y1="55" x2="80" y2="105" stroke-width="1.5"/>
    <line x1="80" y1="105" x2="80" y2="185" stroke-width="2"/>

    <line x1="120" y1="55" x2="120" y2="185" stroke-width="2"/>

    <line x1="160" y1="55" x2="160" y2="105" stroke-width="1.5"/>
    <line x1="160" y1="105" x2="160" y2="185" stroke-width="2"/>

    <line x1="100" y1="75" x2="100" y2="135" stroke-width="1.5"/>
    <line x1="100" y1="135" x2="100" y2="165" stroke-width="1"/>

    <line x1="140" y1="75" x2="140" y2="165" stroke-width="1.5"/>

    <!-- Corner joints -->
    <circle cx="80" cy="75" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="120" cy="75" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="160" cy="75" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="80" cy="105" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="160" cy="105" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="80" cy="135" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="120" cy="135" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="160" cy="135" r="4" fill="#00c8ff" stroke="none"/>
    <circle cx="100" cy="75" r="3" fill="#00c8ff" stroke="none"/>
    <circle cx="140" cy="75" r="3" fill="#00c8ff" stroke="none"/>
    <circle cx="100" cy="135" r="3" fill="#00c8ff" stroke="none"/>
    <circle cx="140" cy="135" r="3" fill="#00c8ff" stroke="none"/>
    <circle cx="120" cy="165" r="4" fill="#00c8ff" stroke="none"/>
  </g>

  <!-- IC chip (center) -->
  <g filter="url(#glow)" opacity="0.9">
    <rect x="100" y="88" width="40" height="40" rx="4" fill="#002838" stroke="#00c8ff" stroke-width="2"/>
    <!-- IC pins left -->
    <line x1="88" y1="96" x2="100" y2="96" stroke="#00c8ff" stroke-width="2"/>
    <line x1="88" y1="108" x2="100" y2="108" stroke="#00c8ff" stroke-width="2"/>
    <line x1="88" y1="120" x2="100" y2="120" stroke="#00c8ff" stroke-width="2"/>
    <!-- IC pins right -->
    <line x1="140" y1="96" x2="152" y2="96" stroke="#00c8ff" stroke-width="2"/>
    <line x1="140" y1="108" x2="152" y2="108" stroke="#00c8ff" stroke-width="2"/>
    <line x1="140" y1="120" x2="152" y2="120" stroke="#00c8ff" stroke-width="2"/>
    <!-- IC label -->
    <text x="120" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#00c8ff" opacity="0.8">CPU</text>
  </g>

  <!-- Label -->
  <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#00c8ff" letter-spacing="2">DIGITAL AGE</text>
</svg>
