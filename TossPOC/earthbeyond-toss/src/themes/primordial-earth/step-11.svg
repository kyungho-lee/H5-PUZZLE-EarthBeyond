<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow11" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow11" x="-100%" y="-100%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepglow11" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg11" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1004"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="groundGrad11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1408"/>
      <stop offset="100%" stop-color="#100c04"/>
    </linearGradient>
    <radialGradient id="warmGlow11" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff9040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="url(#bg11)"/>

  <!-- Warm ambient glow (dawn after extinction) -->
  <ellipse cx="120" cy="120" rx="140" ry="140" fill="url(#warmGlow11)" filter="url(#deepglow11)"/>

  <!-- Stars — warm orange tinted -->
  <g filter="url(#starglow11)">
    <!-- Large warm stars -->
    <g opacity="0.85">
      <circle cx="38" cy="28" r="2.5" fill="#ff9040"/>
      <line x1="38" y1="22" x2="38" y2="34" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
      <line x1="32" y1="28" x2="44" y2="28" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
      <line x1="33" y1="23" x2="43" y2="33" stroke="#ff9040" stroke-width="0.8" opacity="0.5"/>
      <line x1="43" y1="23" x2="33" y2="33" stroke="#ff9040" stroke-width="0.8" opacity="0.5"/>
    </g>
    <g opacity="0.8">
      <circle cx="178" cy="22" r="3" fill="#ffb060"/>
      <line x1="178" y1="15" x2="178" y2="29" stroke="#ffb060" stroke-width="1" opacity="0.7"/>
      <line x1="171" y1="22" x2="185" y2="22" stroke="#ffb060" stroke-width="1" opacity="0.7"/>
      <line x1="173" y1="17" x2="183" y2="27" stroke="#ffb060" stroke-width="0.8" opacity="0.5"/>
      <line x1="183" y1="17" x2="173" y2="27" stroke="#ffb060" stroke-width="0.8" opacity="0.5"/>
    </g>
    <g opacity="0.75">
      <circle cx="215" cy="65" r="2" fill="#ff9040"/>
      <line x1="215" y1="60" x2="215" y2="70" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
      <line x1="210" y1="65" x2="220" y2="65" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
    </g>
    <g opacity="0.7">
      <circle cx="22" cy="78" r="2" fill="#ffb060"/>
      <line x1="22" y1="73" x2="22" y2="83" stroke="#ffb060" stroke-width="1" opacity="0.7"/>
      <line x1="17" y1="78" x2="27" y2="78" stroke="#ffb060" stroke-width="1" opacity="0.7"/>
    </g>
    <g opacity="0.65">
      <circle cx="120" cy="18" r="2.5" fill="#ff9040"/>
      <line x1="120" y1="12" x2="120" y2="24" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
      <line x1="114" y1="18" x2="126" y2="18" stroke="#ff9040" stroke-width="1" opacity="0.7"/>
      <line x1="116" y1="14" x2="124" y2="22" stroke="#ff9040" stroke-width="0.8" opacity="0.5"/>
      <line x1="124" y1="14" x2="116" y2="22" stroke="#ff9040" stroke-width="0.8" opacity="0.5"/>
    </g>
  </g>

  <!-- Small background stars -->
  <g fill="#ffb060" opacity="0.35">
    <circle cx="65" cy="14" r="1"/>
    <circle cx="88" cy="35" r="0.8"/>
    <circle cx="148" cy="12" r="1"/>
    <circle cx="195" cy="40" r="0.8"/>
    <circle cx="228" cy="90" r="1"/>
    <circle cx="8" cy="110" r="0.8"/>
    <circle cx="232" cy="115" r="1"/>
    <circle cx="55" cy="55" r="0.8"/>
    <circle cx="165" cy="48" r="1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="175" width="240" height="65" fill="url(#groundGrad11)"/>

  <!-- Grass / new growth -->
  <g stroke="#556030" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M18 175 Q15 162 20 152"/>
    <path d="M28 175 Q32 160 26 148"/>
    <path d="M38 175 Q35 163 40 155"/>
    <path d="M205 175 Q208 162 203 152"/>
    <path d="M215 175 Q212 160 218 148"/>
    <path d="M225 175 Q228 163 222 155"/>
    <path d="M95 175 Q92 164 96 155"/>
    <path d="M145 175 Q148 164 144 155"/>
  </g>

  <!-- === Mammal silhouettes === -->

  <!-- Small rodent-like mammal (foreground left) -->
  <g transform="translate(45, 175)" fill="#ff9040" filter="url(#glow11)" opacity="0.85">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="18" ry="10"/>
    <!-- head -->
    <circle cx="16" cy="-6" r="9"/>
    <!-- ears -->
    <ellipse cx="12" cy="-14" rx="3" ry="5" fill="#ff9040"/>
    <ellipse cx="20" cy="-15" rx="3" ry="5" fill="#ff9040"/>
    <!-- eye -->
    <circle cx="19" cy="-7" r="2" fill="#ffcc80"/>
    <circle cx="19" cy="-7" r="1" fill="#1a0a00"/>
    <!-- snout -->
    <ellipse cx="24" cy="-4" rx="4" ry="2.5" fill="#ffaa60"/>
    <circle cx="26" cy="-3" r="1" fill="#cc6020"/>
    <!-- tail -->
    <path d="M-16,2 Q-28,8 -32,2 Q-28,-4 -18,0" fill="#ff9040"/>
    <!-- legs -->
    <line x1="-6" y1="8" x2="-8" y2="18" stroke="#ff9040" stroke-width="3" stroke-linecap="round"/>
    <line x1="2" y1="9" x2="1" y2="19" stroke="#ff9040" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="8" x2="12" y2="18" stroke="#ff9040" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Larger mammal (background center, deer-like) -->
  <g transform="translate(130, 175)" fill="#c06830" opacity="0.6" filter="url(#glow11)">
    <!-- body -->
    <ellipse cx="0" cy="-8" rx="28" ry="15"/>
    <!-- neck -->
    <path d="M18,-8 Q24,-20 22,-32 Q24,-24 28,-14Z" fill="#c06830"/>
    <!-- head -->
    <ellipse cx="22" cy="-34" rx="10" ry="7"/>
    <!-- antlers -->
    <path d="M18,-40 Q14,-50 10,-58 M18,-40 Q20,-52 22,-58 M18,-40 Q12,-48 8,-52" stroke="#c06830" stroke-width="2" fill="none"/>
    <path d="M26,-40 Q30,-50 34,-58 M26,-40 Q28,-52 26,-58 M26,-40 Q32,-48 36,-52" stroke="#c06830" stroke-width="2" fill="none"/>
    <!-- legs -->
    <line x1="-14" y1="6" x2="-16" y2="24" stroke="#c06830" stroke-width="4" stroke-linecap="round"/>
    <line x1="-4" y1="7" x2="-4" y2="25" stroke="#c06830" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="6" x2="9" y2="24" stroke="#c06830" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="20" y2="24" stroke="#c06830" stroke-width="4" stroke-linecap="round"/>
    <!-- tail -->
    <ellipse cx="-26" cy="-4" rx="5" ry="4" fill="#e08040"/>
  </g>

  <!-- Warm ground glow beneath mammals -->
  <ellipse cx="65" cy="178" rx="30" ry="5" fill="#ff9040" filter="url(#deepglow11)" opacity="0.1"/>
  <ellipse cx="155" cy="178" rx="40" ry="6" fill="#ff9040" filter="url(#deepglow11)" opacity="0.08"/>

  <!-- Step number watermark -->
  <text x="120" y="88" font-family="monospace" font-size="42" font-weight="bold"
        fill="#ff9040" text-anchor="middle" opacity="0.12" filter="url(#glow11)">11</text>

  <!-- Scene label with star -->
  <text x="120" y="222" font-family="monospace" font-size="13" fill="#ff9040"
        text-anchor="middle" letter-spacing="1" opacity="0.9">MAMMALS &#x2605;</text>
</svg>
