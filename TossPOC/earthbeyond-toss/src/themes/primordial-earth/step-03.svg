<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow03" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreglow03" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="magmaGrad03" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="30%" stop-color="#ff6020"/>
      <stop offset="65%" stop-color="#e63a2e"/>
      <stop offset="100%" stop-color="#7a1010"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="url(#bg03)"/>

  <!-- Outer glow halo -->
  <circle cx="120" cy="118" r="72" fill="#e63a2e" filter="url(#coreglow03)" opacity="0.4"/>

  <!-- Magma planet body -->
  <circle cx="120" cy="118" r="60" fill="url(#magmaGrad03)" filter="url(#glow03)"/>

  <!-- Surface cracks / fissures -->
  <g stroke="#ffcc00" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow03)">
    <!-- Major crack 1 -->
    <path d="M100 80 L108 95 L98 110 L112 128 L105 145"/>
    <!-- Major crack 2 -->
    <path d="M130 75 L125 92 L138 108 L130 125 L142 148"/>
    <!-- Horizontal crack -->
    <path d="M72 112 L88 118 L102 112 L118 120 L138 115 L158 122 L168 118"/>
    <!-- Minor cracks -->
    <path d="M90 88 L96 100 L88 112" stroke-width="1"/>
    <path d="M148 90 L142 105 L152 118" stroke-width="1"/>
    <path d="M108 138 L120 148 L128 140 L138 152" stroke-width="1"/>
  </g>

  <!-- Lava pools (bright spots at crack intersections) -->
  <g filter="url(#glow03)">
    <circle cx="112" cy="128" r="4" fill="#ffee80" opacity="0.9"/>
    <circle cx="98" cy="110" r="3" fill="#ffcc40" opacity="0.85"/>
    <circle cx="138" cy="108" r="3" fill="#ffee80" opacity="0.85"/>
    <circle cx="118" cy="120" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="130" cy="125" r="2.5" fill="#ffcc40" opacity="0.8"/>
  </g>

  <!-- Step number watermark -->
  <text x="120" y="82" font-family="monospace" font-size="42" font-weight="bold"
        fill="#e63a2e" text-anchor="middle" opacity="0.15" filter="url(#glow03)">03</text>

  <!-- Scene label -->
  <text x="120" y="222" font-family="monospace" font-size="13" fill="#ff8060"
        text-anchor="middle" letter-spacing="1" opacity="0.85">MAGMA EARTH</text>
</svg>
