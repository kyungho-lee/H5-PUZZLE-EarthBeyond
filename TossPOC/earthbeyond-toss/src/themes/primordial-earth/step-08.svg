<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow08" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepglow08" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg08" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#081020"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="seaGrad08" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#083858"/>
      <stop offset="100%" stop-color="#040e28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="url(#bg08)"/>

  <!-- Ocean -->
  <rect x="0" y="105" width="240" height="135" fill="url(#seaGrad08)" opacity="0.85"/>

  <!-- Water surface -->
  <path d="M0 108 Q30 102 60 108 Q90 114 120 108 Q150 102 180 108 Q210 114 240 108 L240 120 L0 120 Z"
        fill="#1a6090" opacity="0.4"/>

  <!-- === Cambrian creatures === -->

  <!-- Anomalocaris (top predator) — segmented shrimp-like -->
  <g transform="translate(118, 135)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="38" ry="10" fill="#e06030"/>
    <ellipse cx="-28" cy="3" rx="12" ry="7" fill="#c84820"/>
    <ellipse cx="30" cy="-2" rx="10" ry="6" fill="#e07040"/>
    <!-- segments -->
    <line x1="-18" y1="-9" x2="-18" y2="9" stroke="#c05020" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="-10" x2="-6" y2="10" stroke="#c05020" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="-10" x2="6" y2="10" stroke="#c05020" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="-9" x2="18" y2="9" stroke="#c05020" stroke-width="1" opacity="0.6"/>
    <!-- eye -->
    <circle cx="32" cy="-3" r="3" fill="#ffdd00"/>
    <!-- frontal appendages -->
    <path d="M38,2 Q50,-8 52,-2" stroke="#e07040" stroke-width="2" fill="none"/>
    <path d="M38,5 Q48,12 50,8" stroke="#e07040" stroke-width="2" fill="none"/>
  </g>

  <!-- Trilobite 1 -->
  <g transform="translate(60, 158)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="15" ry="9" fill="#7a9060"/>
    <ellipse cx="0" cy="-2" rx="6" ry="9" fill="#8aaa70"/>
    <!-- segments -->
    <line x1="-14" y1="-2" x2="14" y2="-2" stroke="#5a7040" stroke-width="1" opacity="0.7"/>
    <line x1="-13" y1="2" x2="13" y2="2" stroke="#5a7040" stroke-width="1" opacity="0.7"/>
    <!-- head -->
    <ellipse cx="0" cy="-8" rx="6" ry="4" fill="#6a8055"/>
    <circle cx="-3" cy="-9" r="1.5" fill="#ccee80"/>
    <circle cx="3" cy="-9" r="1.5" fill="#ccee80"/>
  </g>

  <!-- Trilobite 2 (different angle) -->
  <g transform="translate(180, 165) rotate(-20)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="#608870"/>
    <ellipse cx="0" cy="-2" rx="5" ry="8" fill="#70a080"/>
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#406050" stroke-width="1" opacity="0.7"/>
    <line x1="-11" y1="2" x2="11" y2="2" stroke="#406050" stroke-width="1" opacity="0.7"/>
    <ellipse cx="0" cy="-7" rx="5" ry="3.5" fill="#508060"/>
    <circle cx="-2.5" cy="-8" r="1.2" fill="#aaddaa"/>
    <circle cx="2.5" cy="-8" r="1.2" fill="#aaddaa"/>
  </g>

  <!-- Jellyfish-like medusozoan -->
  <g transform="translate(42, 125)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#cc44cc" opacity="0.6"/>
    <ellipse cx="0" cy="1" rx="9" ry="5" fill="#ee66ee" opacity="0.4"/>
    <!-- tentacles -->
    <path d="M-8,6 Q-10,18 -8,26" stroke="#cc44cc" stroke-width="1.2" fill="none" opacity="0.7"/>
    <path d="M-3,8 Q-4,20 -2,28" stroke="#cc44cc" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M3,8 Q4,20 2,28" stroke="#cc44cc" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M8,6 Q10,18 8,26" stroke="#cc44cc" stroke-width="1.2" fill="none" opacity="0.7"/>
  </g>

  <!-- Wiwaxia (spiky creature) -->
  <g transform="translate(155, 182)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#8060a0"/>
    <!-- spines -->
    <line x1="-6" y1="-5" x2="-10" y2="-15" stroke="#a080c0" stroke-width="1.5"/>
    <line x1="-2" y1="-6" x2="-3" y2="-17" stroke="#a080c0" stroke-width="1.5"/>
    <line x1="2" y1="-6" x2="3" y2="-17" stroke="#a080c0" stroke-width="1.5"/>
    <line x1="6" y1="-5" x2="10" y2="-15" stroke="#a080c0" stroke-width="1.5"/>
    <line x1="-9" y1="0" x2="-15" y2="-6" stroke="#9070b0" stroke-width="1"/>
    <line x1="9" y1="0" x2="15" y2="-6" stroke="#9070b0" stroke-width="1"/>
  </g>

  <!-- Opabinia (5-eyed creature, simplified) -->
  <g transform="translate(100, 175)" filter="url(#glow08)">
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="#40a870"/>
    <!-- 5 eyes -->
    <circle cx="-14" cy="-5" r="2" fill="#aaff80"/>
    <circle cx="-8" cy="-7" r="2" fill="#aaff80"/>
    <circle cx="-2" cy="-8" r="2" fill="#aaff80"/>
    <circle cx="4" cy="-7" r="2" fill="#aaff80"/>
    <circle cx="10" cy="-5" r="2" fill="#aaff80"/>
    <!-- front appendage -->
    <path d="M16,0 Q24,-4 22,4" stroke="#40a870" stroke-width="2" fill="none"/>
  </g>

  <!-- Floating spores / plankton -->
  <g fill="#88eecc" opacity="0.45" filter="url(#glow08)">
    <circle cx="25" cy="115" r="1.5"/>
    <circle cx="80" cy="112" r="1"/>
    <circle cx="145" cy="115" r="1.5"/>
    <circle cx="200" cy="113" r="1"/>
    <circle cx="220" cy="125" r="1.5"/>
    <circle cx="15" cy="135" r="1"/>
    <circle cx="230" cy="145" r="1.5"/>
  </g>

  <!-- Step number watermark -->
  <text x="120" y="88" font-family="monospace" font-size="42" font-weight="bold"
        fill="#e06030" text-anchor="middle" opacity="0.10" filter="url(#deepglow08)">08</text>

  <!-- Scene label -->
  <text x="120" y="222" font-family="monospace" font-size="13" fill="#88eecc"
        text-anchor="middle" letter-spacing="2" opacity="0.9">CAMBRIAN</text>
</svg>
