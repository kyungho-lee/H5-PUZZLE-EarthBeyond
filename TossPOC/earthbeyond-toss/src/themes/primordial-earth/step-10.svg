<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow10" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flashglow10" x="-100%" y="-100%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dustglow10" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0e04"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="flashGrad10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffe060" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff8a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dustGrad10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c08040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#804020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — already darkened sky -->
  <rect width="240" height="240" fill="url(#bg10)"/>

  <!-- Dust cloud — large dark billow covering upper half -->
  <ellipse cx="120" cy="90" rx="130" ry="75" fill="#3a2010" filter="url(#dustglow10)" opacity="0.65"/>
  <ellipse cx="60" cy="110" rx="75" ry="50" fill="#2a1808" filter="url(#dustglow10)" opacity="0.55"/>
  <ellipse cx="185" cy="105" rx="65" ry="45" fill="#2a1808" filter="url(#dustglow10)" opacity="0.5"/>
  <ellipse cx="120" cy="140" rx="100" ry="40" fill="#1a0e04" filter="url(#dustglow10)" opacity="0.5"/>

  <!-- Dust cloud rolling in from sides -->
  <ellipse cx="20" cy="120" rx="50" ry="70" fill="#c08040" filter="url(#dustglow10)" opacity="0.2"/>
  <ellipse cx="220" cy="125" rx="50" ry="65" fill="#c08040" filter="url(#dustglow10)" opacity="0.2"/>

  <!-- Impact flash — central explosion -->
  <circle cx="120" cy="118" r="55" fill="url(#flashGrad10)" filter="url(#flashglow10)"/>

  <!-- Bright core -->
  <circle cx="120" cy="118" r="18" fill="#ffffff" filter="url(#flashglow10)" opacity="0.95"/>
  <circle cx="120" cy="118" r="8" fill="#fffdf0"/>

  <!-- Ejecta rays -->
  <g stroke="#ff8a00" stroke-width="2" fill="none" filter="url(#glow10)" opacity="0.7">
    <line x1="120" y1="118" x2="32" y2="38"/>
    <line x1="120" y1="118" x2="120" y2="18"/>
    <line x1="120" y1="118" x2="208" y2="38"/>
    <line x1="120" y1="118" x2="220" y2="118"/>
    <line x1="120" y1="118" x2="200" y2="198"/>
    <line x1="120" y1="118" x2="120" y2="210"/>
    <line x1="120" y1="118" x2="40" y2="198"/>
    <line x1="120" y1="118" x2="20" y2="118"/>
    <line x1="120" y1="118" x2="165" y2="28" stroke-width="1.5"/>
    <line x1="120" y1="118" x2="75" y2="28" stroke-width="1.5"/>
    <line x1="120" y1="118" x2="210" y2="168" stroke-width="1.5"/>
    <line x1="120" y1="118" x2="30" y2="168" stroke-width="1.5"/>
  </g>

  <!-- Molten debris -->
  <g fill="#ff8a00" filter="url(#glow10)">
    <circle cx="68" cy="62" r="4" opacity="0.8"/>
    <circle cx="178" cy="55" r="3.5" opacity="0.75"/>
    <circle cx="45" cy="145" r="3" opacity="0.7"/>
    <circle cx="198" cy="155" r="4" opacity="0.75"/>
    <circle cx="160" cy="42" r="2.5" opacity="0.7"/>
    <circle cx="82" cy="48" r="3" opacity="0.65"/>
    <circle cx="205" cy="88" r="2.5" opacity="0.65"/>
    <circle cx="30" cy="88" r="3" opacity="0.65"/>
    <circle cx="155" cy="185" r="3.5" opacity="0.7"/>
    <circle cx="80" cy="190" r="2.5" opacity="0.65"/>
  </g>

  <!-- Horizon fire line -->
  <rect x="0" y="185" width="240" height="15" fill="#ff4000" opacity="0.15" filter="url(#glow10)"/>
  <path d="M0 185 Q40 178 80 185 Q120 192 160 185 Q200 178 240 185 L240 200 L0 200Z"
        fill="#ff6a00" opacity="0.2" filter="url(#glow10)"/>

  <!-- Step number watermark -->
  <text x="120" y="90" font-family="monospace" font-size="42" font-weight="bold"
        fill="#ff8a00" text-anchor="middle" opacity="0.15" filter="url(#glow10)">10</text>

  <!-- Scene label -->
  <text x="120" y="222" font-family="monospace" font-size="13" fill="#ff8a00"
        text-anchor="middle" letter-spacing="1" opacity="0.9">EXTINCTION</text>
</svg>
