<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow05" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow05" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="titanGrad" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#ffb870"/>
      <stop offset="50%" stop-color="#ff9040"/>
      <stop offset="85%" stop-color="#d05010"/>
      <stop offset="100%" stop-color="#601800"/>
    </radialGradient>
    <radialGradient id="titanHaze" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#ff9040" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff6020" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#050810"/>

  <!-- Stars -->
  <circle cx="18" cy="14" r="1" fill="white" opacity="0.5"/>
  <circle cx="55" cy="7" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="92" cy="30" r="1" fill="white" opacity="0.7"/>
  <circle cx="130" cy="5" r="1" fill="white" opacity="0.5"/>
  <circle cx="170" cy="18" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="210" cy="12" r="1" fill="white" opacity="0.6"/>
  <circle cx="226" cy="46" r="1" fill="white" opacity="0.4"/>
  <circle cx="7" cy="80" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="233" cy="100" r="1" fill="white" opacity="0.3"/>
  <circle cx="5" cy="145" r="1" fill="white" opacity="0.6"/>
  <circle cx="235" cy="158" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="20" cy="190" r="1" fill="white" opacity="0.5"/>
  <circle cx="216" cy="194" r="1" fill="white" opacity="0.3"/>
  <circle cx="70" cy="215" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="158" cy="220" r="1" fill="white" opacity="0.4"/>

  <!-- Atmosphere haze -->
  <circle cx="120" cy="112" r="78" fill="#ff6020" opacity="0.12" filter="url(#glow05)"/>

  <!-- Titan body -->
  <circle cx="120" cy="112" r="70" fill="url(#titanGrad)" filter="url(#softglow05)"/>

  <!-- Thick atmosphere ring -->
  <circle cx="120" cy="112" r="70" fill="none" stroke="#ff7030" stroke-width="8" opacity="0.3"/>

  <!-- Methane lakes (blue patches on surface) -->
  <ellipse cx="88" cy="130" rx="12" ry="7" fill="#3060c0" opacity="0.6"/>
  <ellipse cx="102" cy="145" rx="8" ry="5" fill="#2050a8" opacity="0.55"/>
  <ellipse cx="75" cy="110" rx="6" ry="4" fill="#3868d0" opacity="0.5"/>
  <ellipse cx="148" cy="125" rx="10" ry="6" fill="#2858b8" opacity="0.55"/>
  <ellipse cx="135" cy="148" rx="7" ry="4" fill="#3060c0" opacity="0.45"/>
  <ellipse cx="160" cy="140" rx="5" ry="3" fill="#2050a8" opacity="0.5"/>

  <!-- Haze bands -->
  <clipPath id="titanClip"><circle cx="120" cy="112" r="70"/></clipPath>
  <g clip-path="url(#titanClip)">
    <rect x="50" y="78" width="140" height="10" fill="#ff8030" opacity="0.2" rx="3"/>
    <rect x="50" y="104" width="140" height="12" fill="#e06018" opacity="0.2" rx="3"/>
  </g>

  <!-- Label -->
  <text x="120" y="206" font-family="monospace" font-size="13" fill="white" opacity="0.85" text-anchor="middle" letter-spacing="3">TITAN</text>
</svg>
