<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pyramidGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#a07800"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" fill="#0a0e1a"/>

  <!-- Stars -->
  <g fill="#ffd200" opacity="0.4">
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="70" cy="25" r="1"/>
    <circle cx="110" cy="35" r="1.5"/>
    <circle cx="160" cy="28" r="1"/>
    <circle cx="195" cy="42" r="1.5"/>
    <circle cx="210" cy="65" r="1"/>
    <circle cx="30" cy="70" r="1"/>
    <circle cx="55" cy="58" r="1.5"/>
    <circle cx="185" cy="55" r="1.5"/>
  </g>

  <!-- Large pyramid -->
  <g filter="url(#glow)">
    <polygon points="120,55 52,180 188,180" fill="url(#pyramidGrad)" opacity="0.95"/>
    <!-- Shadow face -->
    <polygon points="120,55 120,180 188,180" fill="#704a00" opacity="0.5"/>
    <!-- Stone lines horizontal -->
    <line x1="76" y1="120" x2="164" y2="120" stroke="#0a0e1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="88" y1="145" x2="152" y2="145" stroke="#0a0e1a" stroke-width="1.2" opacity="0.5"/>
    <line x1="64" y1="165" x2="176" y2="165" stroke="#0a0e1a" stroke-width="1.2" opacity="0.5"/>
    <!-- Capstone glow -->
    <circle cx="120" cy="55" r="6" fill="#ffe060" opacity="0.9"/>
  </g>

  <!-- Ground -->
  <rect x="40" y="180" width="160" height="4" fill="#7a5a00" opacity="0.6"/>

  <!-- Label -->
  <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ffd200" letter-spacing="2">ANCIENT CIVS</text>
</svg>
