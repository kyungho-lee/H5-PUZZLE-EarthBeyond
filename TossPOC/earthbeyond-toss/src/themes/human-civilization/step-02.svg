<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" fill="#0a0e1a"/>

  <!-- Wheat stalks -->
  <g filter="url(#glow)" stroke="#52c788" stroke-width="2" fill="none" opacity="0.9">
    <!-- Stalk 1 -->
    <line x1="80" y1="190" x2="80" y2="90"/>
    <line x1="80" y1="110" x2="68" y2="95"/>
    <line x1="80" y1="120" x2="92" y2="105"/>
    <line x1="80" y1="130" x2="68" y2="115"/>
    <line x1="80" y1="140" x2="92" y2="125"/>
    <!-- Grain head -->
    <ellipse cx="80" cy="88" rx="6" ry="12" fill="#52c788" stroke="none"/>
    <ellipse cx="74" cy="93" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(-20 74 93)"/>
    <ellipse cx="86" cy="93" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(20 86 93)"/>

    <!-- Stalk 2 -->
    <line x1="120" y1="190" x2="120" y2="82"/>
    <line x1="120" y1="100" x2="108" y2="85"/>
    <line x1="120" y1="112" x2="132" y2="97"/>
    <line x1="120" y1="124" x2="108" y2="109"/>
    <line x1="120" y1="136" x2="132" y2="121"/>
    <!-- Grain head -->
    <ellipse cx="120" cy="80" rx="6" ry="13" fill="#52c788" stroke="none"/>
    <ellipse cx="113" cy="86" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(-20 113 86)"/>
    <ellipse cx="127" cy="86" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(20 127 86)"/>

    <!-- Stalk 3 -->
    <line x1="160" y1="190" x2="160" y2="90"/>
    <line x1="160" y1="110" x2="148" y2="95"/>
    <line x1="160" y1="122" x2="172" y2="107"/>
    <line x1="160" y1="134" x2="148" y2="119"/>
    <line x1="160" y1="146" x2="172" y2="131"/>
    <!-- Grain head -->
    <ellipse cx="160" cy="88" rx="6" ry="12" fill="#52c788" stroke="none"/>
    <ellipse cx="154" cy="93" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(-20 154 93)"/>
    <ellipse cx="166" cy="93" rx="5" ry="10" fill="#52c788" stroke="none" transform="rotate(20 166 93)"/>
  </g>

  <!-- Ground line -->
  <line x1="50" y1="190" x2="190" y2="190" stroke="#52c788" stroke-width="1.5" opacity="0.4"/>

  <!-- Label -->
  <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#52c788" letter-spacing="2">AGRICULTURE</text>
</svg>
