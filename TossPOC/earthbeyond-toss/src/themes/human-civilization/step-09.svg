<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8080"/>
      <stop offset="100%" stop-color="#ff2040"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" fill="#0a0e1a"/>

  <!-- Outer orbit ellipse 1 (tilted) -->
  <g filter="url(#glow)" fill="none" stroke="#ff4060" stroke-width="1.8" opacity="0.8">
    <ellipse cx="120" cy="115" rx="75" ry="28" transform="rotate(-30 120 115)"/>
  </g>
  <!-- Outer orbit ellipse 2 (tilted other way) -->
  <g filter="url(#glow)" fill="none" stroke="#ff4060" stroke-width="1.8" opacity="0.8">
    <ellipse cx="120" cy="115" rx="75" ry="28" transform="rotate(30 120 115)"/>
  </g>
  <!-- Vertical orbit -->
  <g filter="url(#glow)" fill="none" stroke="#ff4060" stroke-width="1.8" opacity="0.8">
    <ellipse cx="120" cy="115" rx="75" ry="28" transform="rotate(90 120 115)"/>
  </g>

  <!-- Electrons on orbits -->
  <g filter="url(#glow)" fill="#ff8090">
    <!-- Electron 1 on orbit 1 -->
    <circle cx="62" cy="90" r="6"/>
    <!-- Electron 2 on orbit 2 -->
    <circle cx="178" cy="140" r="6"/>
    <!-- Electron 3 on vertical orbit -->
    <circle cx="120" cy="42" r="6"/>
  </g>

  <!-- Nucleus -->
  <g filter="url(#coreglow)">
    <circle cx="120" cy="115" r="22" fill="url(#nucleusGrad)"/>
    <!-- Proton/neutron hints -->
    <circle cx="112" cy="108" r="7" fill="#ff6070" opacity="0.8"/>
    <circle cx="128" cy="108" r="7" fill="#cc3050" opacity="0.8"/>
    <circle cx="120" cy="122" r="7" fill="#ff5060" opacity="0.8"/>
    <circle cx="114" cy="120" r="5" fill="#ee4055" opacity="0.6"/>
    <circle cx="126" cy="120" r="5" fill="#dd3045" opacity="0.6"/>
  </g>

  <!-- Radiation symbol hint (subtle) -->
  <g stroke="#ff4060" stroke-width="1" fill="none" opacity="0.2">
    <circle cx="120" cy="115" r="36"/>
  </g>

  <!-- Label -->
  <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ff4060" letter-spacing="2">ATOMIC AGE</text>
</svg>
